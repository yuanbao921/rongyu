<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧱 俄罗斯方块 · 陆沉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg, #F5EDE4);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.4s;
    }

    .game-wrapper {
      width: 94%;
      max-width: 400px;
      background: rgba(255, 252, 248, 0.40);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-radius: 32px;
      padding: 16px 16px 20px;
      border: 1px solid rgba(194, 130, 122, 0.06);
      box-shadow: 0 8px 48px rgba(90, 74, 58, 0.04);
      text-align: center;
    }

    .game-title {
      font-size: 12px;
      color: rgba(90, 74, 58, 0.20);
      letter-spacing: 6px;
      margin-bottom: 8px;
      font-weight: 300;
    }

    /* ---------- 游戏信息 ---------- */
    .game-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 8px 4px;
      border-bottom: 1px dashed rgba(194, 130, 122, 0.06);
      margin-bottom: 8px;
    }

    .score-item {
      font-size: 12px;
      color: rgba(90, 74, 58, 0.30);
      letter-spacing: 0.5px;
    }
    .score-item span {
      font-weight: 400;
      color: var(--brown, #4A3832);
    }

    .next-label {
      font-size: 10px;
      color: rgba(90, 74, 58, 0.20);
      letter-spacing: 1px;
    }

    /* ---------- 画布 ---------- */
    .canvas-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(194, 130, 122, 0.04);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.6;
      background: rgba(255, 255, 255, 0.06);
      touch-action: none;
      cursor: pointer;
    }

    /* ---------- 消息 ---------- */
    .game-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 0 4px;
    }

    .message-box {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: var(--rose, #C2827A);
      font-weight: 350;
      letter-spacing: 0.3px;
      min-height: 1.5em;
      font-style: italic;
    }

    /* ---------- 按钮 ---------- */
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 22px;
      border-radius: 40px;
      border: 1px solid rgba(194, 130, 122, 0.10);
      background: rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 12px;
      color: var(--brown, #4A3832);
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .btn:active {
      transform: scale(0.92);
      background: rgba(194, 130, 122, 0.06);
    }

    .btn-primary {
      background: var(--rose, #C2827A);
      color: #fff;
      border-color: var(--rose, #C2827A);
    }
    .btn-primary:active {
      background: var(--rose-dark, #A06860);
    }

    .back-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      color: rgba(90, 74, 58, 0.12);
      text-decoration: none;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(194, 130, 122, 0.03);
      padding-bottom: 2px;
    }
    .back-link:active {
      color: rgba(90, 74, 58, 0.25);
    }

    /* ---------- 小屏适配 ---------- */
    @media (max-width: 400px) {
      .game-wrapper { padding: 12px 10px 14px; }
      .score-item { font-size: 11px; }
      .message-box { font-size: 11px; }
      .btn { font-size: 11px; padding: 6px 16px; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-title">✦ 俄 罗 斯 方 块 ✦</div>

  <div class="game-top">
    <div class="score-item">✨ 分数 <span id="scoreDisplay">0</span></div>
    <div class="next-label">下一个</div>
    <canvas id="nextCanvas" width="80" height="80"></canvas>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="240" height="400"></canvas>
  </div>

  <div class="game-info">
    <div class="message-box" id="messageBox">左右滑动 · 点击旋转</div>
  </div>

  <div class="btn-group">
    <button class="btn" id="restartBtn">🔄 重来</button>
  </div>

  <a class="back-link" href="index.html">← 回 绒 语</a>
</div>

<script>
  // ============================================================
  //  俄罗斯方块 · 陆沉版
  //  低饱和暖色 · 毛玻璃 · 温柔语录
  // ============================================================

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const messageBox = document.getElementById('messageBox');

  // ---------- 尺寸 ----------
  const COLS = 10;
  const ROWS = 20;
  const BLOCK_SIZE = canvas.width / COLS;

  // ---------- 配色（低饱和绒语风） ----------
  const COLORS = [
    null,
    '#D4A0A0', // 1 玫瑰粉
    '#C8B0A0', // 2 奶茶棕
    '#A8BCC8', // 3 雾蓝
    '#D4B898', // 4 暖杏
    '#C8A8B8', // 5 浅紫
    '#D8A898', // 6 蜜桃
    '#C8B8A0', // 7 绒球金
  ];

  const LIGHT_COLORS = [
    null,
    '#F0D0D0',
    '#E8D8CC',
    '#D0DCE8',
    '#E8D8C0',
    '#E0D0D8',
    '#ECD0C8',
    '#E8DDCC',
  ];

  // ---------- 方块形状 ----------
  const SHAPES = [
    null,
    [[1, 1, 1, 1]],           // I
    [[1, 1], [1, 1]],         // O
    [[0, 1, 0], [1, 1, 1]],   // T
    [[1, 0, 0], [1, 1, 1]],   // L
    [[0, 0, 1], [1, 1, 1]],   // J
    [[0, 1, 1], [1, 1, 0]],   // S
    [[1, 1, 0], [0, 1, 1]],   // Z
  ];

  const SHAPE_COLORS = [null, 1, 2, 3, 4, 5, 6, 7];

  // ---------- 陆沉语录 ----------
  const LUCHEN_SAYS = {
    5: '✨ 五行了，你比我想象中厉害。',
    10: '🌙 十行！我越来越喜欢你了。',
    20: '☀️ 二十行！你就是我的小太阳。',
    50: '🌸 五十行… 我已经完全被你征服了。',
  };

  // ---------- 状态 ----------
  let grid = [];
  let currentPiece = null;
  let nextPiece = null;
  let score = 0;
  let linesCleared = 0;
  let gameOver = false;
  let gameInterval = null;
  let dropInterval = 500;

  // ---------- 初始化 ----------
  function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = 0;
      }
    }
  }

  function createPiece() {
    const type = Math.floor(Math.random() * 7) + 1;
    const shape = SHAPES[type].map(row => [...row]);
    return {
      type: type,
      shape: shape,
      color: SHAPE_COLORS[type],
      x: Math.floor((COLS - shape[0].length) / 2),
      y: 0,
    };
  }

  function spawnPiece() {
    if (nextPiece === null) {
      nextPiece = createPiece();
    }
    currentPiece = {
      type: nextPiece.type,
      shape: nextPiece.shape.map(row => [...row]),
      color: nextPiece.color,
      x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
      y: 0,
    };
    nextPiece = createPiece();

    // 检查是否 Game Over
    if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
      gameOver = true;
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
      messageBox.textContent = '💔 结束了… 陆沉说：我陪你重新开始。';
    }
    draw();
    drawNext();
  }

  // ---------- 碰撞检测 ----------
  function collision(shape, offX, offY) {
    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (shape[r][c]) {
          const x = offX + c;
          const y = offY + r;
          if (x < 0 || x >= COLS || y >= ROWS || y < 0) return true;
          if (y >= 0 && grid[y][x] !== 0) return true;
        }
      }
    }
    return false;
  }

  // ---------- 锁定方块 ----------
  function lockPiece() {
    const { shape, x, y, color } = currentPiece;
    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (shape[r][c]) {
          const gx = x + c;
          const gy = y + r;
          if (gy >= 0) grid[gy][gx] = color;
        }
      }
    }
    clearLines();
    spawnPiece();
  }

  // ---------- 消除行 ----------
  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r].every(cell => cell !== 0)) {
        grid.splice(r, 1);
        grid.unshift(new Array(COLS).fill(0));
        cleared++;
        r++; // 重新检查同一行
      }
    }

    if (cleared > 0) {
      linesCleared += cleared;
      const addScore = cleared * cleared * 10;
      score += addScore;
      scoreDisplay.textContent = score;

      // 陆沉说话
      const milestone = [5, 10, 20, 50].find(m => linesCleared >= m && linesCleared - cleared < m);
      if (milestone && LUCHEN_SAYS[milestone]) {
        messageBox.textContent = '✦ ' + LUCHEN_SAYS[milestone];
      } else {
        const sayings = ['✨ 好棒！', '🌸 继续加油！', '💕 你真的很厉害。', '🧶 越来越顺手了！'];
        messageBox.textContent = '✦ ' + sayings[Math.floor(Math.random() * sayings.length)];
      }

      // 加速
      if (cleared >= 2 && dropInterval > 150) {
        dropInterval = Math.max(150, dropInterval - 20);
        if (gameInterval) {
          clearInterval(gameInterval);
          gameInterval = setInterval(drop, dropInterval);
        }
      }
    }
  }

  // ---------- 下落 ----------
  function drop() {
    if (gameOver || !currentPiece) return;
    if (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
      currentPiece.y++;
      draw();
    } else {
      lockPiece();
      draw();
    }
  }

  // ---------- 移动 ----------
  function move(dx) {
    if (gameOver || !currentPiece) return;
    if (!collision(currentPiece.shape, currentPiece.x + dx, currentPiece.y)) {
      currentPiece.x += dx;
      draw();
    }
  }

  // ---------- 旋转 ----------
  function rotate() {
    if (gameOver || !currentPiece) return;
    const shape = currentPiece.shape;
    const rotated = shape[0].map((_, idx) => shape.map(row => row[idx]).reverse());
    if (!collision(rotated, currentPiece.x, currentPiece.y)) {
      currentPiece.shape = rotated;
      draw();
    }
  }

  // ---------- 硬降 ----------
  function hardDrop() {
    if (gameOver || !currentPiece) return;
    while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
      currentPiece.y++;
    }
    lockPiece();
    draw();
  }

  // ---------- 绘制 ----------
  function drawBlock(ctx, x, y, color, size, alpha = 1.0) {
    const colorVal = COLORS[color];
    const lightVal = LIGHT_COLORS[color];
    if (!colorVal) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    // 主体（圆角矩形）
    const r = size * 0.08;
    const grad = ctx.createRadialGradient(
      x + size * 0.2, y + size * 0.2, size * 0.05,
      x + size / 2, y + size / 2, size * 0.6
    );
    grad.addColorStop(0, lightVal || colorVal);
    grad.addColorStop(0.7, colorVal);
    grad.addColorStop(1, colorVal);

    ctx.shadowColor = 'rgba(90, 74, 58, 0.04)';
    ctx.shadowBlur = 6;

    ctx.beginPath();
    ctx.roundRect(x + 1, y + 1, size - 2, size - 2, r);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // 高光
    ctx.beginPath();
    ctx.roundRect(x + size * 0.15, y + size * 0.1, size * 0.25, size * 0.12, 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.fill();

    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 网格（极淡）
    ctx.strokeStyle = 'rgba(194, 130, 122, 0.02)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * BLOCK_SIZE, 0);
      ctx.lineTo(i * BLOCK_SIZE, canvas.height);
      ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * BLOCK_SIZE);
      ctx.lineTo(canvas.width, i * BLOCK_SIZE);
      ctx.stroke();
    }

    // 已固定的方块
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] !== 0) {
          drawBlock(ctx, c * BLOCK_SIZE, r * BLOCK_SIZE, grid[r][c], BLOCK_SIZE);
        }
      }
    }

    // 当前方块
    if (currentPiece && !gameOver) {
      const { shape, x, y, color } = currentPiece;
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) {
            const gx = (x + c) * BLOCK_SIZE;
            const gy = (y + r) * BLOCK_SIZE;
            drawBlock(ctx, gx, gy, color, BLOCK_SIZE);
          }
        }
      }
    }

    // Game Over 遮罩
    if (gameOver) {
      ctx.fillStyle = 'rgba(90, 74, 58, 0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '18px "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(90, 74, 58, 0.40)';
      ctx.fillText('💭 再试一次', canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = '11px "PingFang SC", sans-serif';
      ctx.fillStyle = 'rgba(90, 74, 58, 0.20)';
      ctx.fillText('陆沉说：我陪你重新来', canvas.width / 2, canvas.height / 2 + 24);
    }
  }

  // ---------- 绘制下一个方块 ----------
  function drawNext() {
    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!nextPiece) return;
    const shape = nextPiece.shape;
    const color = nextPiece.color;
    const size = 20;
    const offX = (nextCanvas.width - shape[0].length * size) / 2;
    const offY = (nextCanvas.height - shape.length * size) / 2;
    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (shape[r][c]) {
          drawBlock(nextCtx, offX + c * size, offY + r * size, color, size);
        }
      }
    }
  }

  // ---------- 事件绑定 ----------
  // 键盘
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); move(1); }
    if (e.key === 'ArrowDown') { e.preventDefault(); drop(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); rotate(); }
    if (e.key === ' ') { e.preventDefault(); hardDrop(); }
    if (e.key === 'r' || e.key === 'R') { restartGame(); }
  });

  // 触摸/点击控制
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    touchStartTime = Date.now();
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchStartX) return;
    const touch = e.touches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    if (Math.abs(dx) > 30) {
      move(dx > 0 ? 1 : -1);
      touchStartX = touch.clientX;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const dt = Date.now() - touchStartTime;
    if (dt < 200) {
      rotate();
    }
    touchStartX = 0;
  }, { passive: false });

  // 鼠标点击（旋转）
  canvas.addEventListener('click', () => {
    rotate();
  });

  // ---------- 重启 ----------
  function restartGame() {
    if (gameInterval) {
      clearInterval(gameInterval);
      gameInterval = null;
    }
    initGrid();
    score = 0;
    linesCleared = 0;
    dropInterval = 500;
    gameOver = false;
    scoreDisplay.textContent = '0';
    messageBox.textContent = '左右滑动 · 点击旋转';
    nextPiece = createPiece();
    spawnPiece();
    gameInterval = setInterval(drop, dropInterval);
  }

  // ---------- roundRect polyfill for canvas ----------
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
      const r = typeof radii === 'number' ? radii : (radii || 0);
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      return this;
    };
  }

  // ---------- 启动 ----------
  initGrid();
  nextPiece = createPiece();
  spawnPiece();
  gameInterval = setInterval(drop, dropInterval);
</script>

</body>
</html>
