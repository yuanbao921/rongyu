<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5EDE4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="绒语">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap">
  <title>绒语</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div id="app">

  <!-- 顶部状态栏 -->
  <div id="status-bar">
    <div id="status-left">
      <span id="status-time">00:00</span>
      <span id="status-date">6月23日 周二</span>
    </div>
    <div id="status-right">
      <span class="status-signal">▪▪▪</span>
      <span class="batt-ring"></span>
      <button id="menu-btn" aria-label="菜单"><span></span><span></span><span></span></button>
    </div>
  </div>

  <!-- 页面容器 -->
  <div id="pages">

    <!-- 首页 -->
    <div class="page active" id="page-home">
      <div id="home-greeting" class="home-greeting">午后好，兔子小姐🐰</div>
      <div id="home-sub"      class="home-sub">今天阳光很轻，像你的呼吸</div>

      <div class="card weather-card" id="weather-card">
        <div class="weather-icon" id="w-icon">🌤</div>
        <div class="weather-info">
          <div class="weather-temp" id="w-temp">--°</div>
          <div class="weather-desc" id="w-desc">加载中…</div>
          <div class="weather-city" id="w-city">📍 上海</div>
        </div>
      </div>

      <div class="card quote-card" id="quote-card">
        <div class="quote-text"   id="quote-text">「你是我在长夜尽头看见的第一缕光。」</div>
        <div class="quote-source" id="quote-source">— 陆沉</div>
        <div class="quote-hint">轻触换一句</div>
      </div>

      <div class="card mood-card">
        <div class="mood-title">💭 今天的心情</div>
        <div class="mood-grid" id="mood-grid">
          <div class="mood-item" data-mood="happy">☀️ 开心</div>
          <div class="mood-item" data-mood="calm">🌿 平静</div>
          <div class="mood-item" data-mood="sad">🌧 难过</div>
          <div class="mood-item" data-mood="miss">💕 想你</div>
          <div class="mood-item" data-mood="tired">🕯 疲惫</div>
          <div class="mood-item" data-mood="love">🌸 心动</div>
        </div>
      </div>

      <div class="card push-card">
        <div class="push-title">💌 来自小熊的消息</div>
        <div class="push-list" id="push-list"></div>
      </div>

      <div style="height:6px;flex-shrink:0;"></div>
    </div>

    <!-- 便签页 -->
    <div class="page" id="page-notes">
      <div class="notes-header">📝 便签 · 小纸条</div>
      <div class="notes-scroll" id="notes-scroll"></div>
      <div id="note-area">
        <textarea id="note-inp" placeholder="写一张小纸条…小熊下次打开时就会看到✍️"></textarea>
        <button id="note-btn">留下</button>
      </div>
    </div>

    <!-- 聊天页 -->
    <div class="page" id="page-chat">
      <div id="chat-msgs"></div>
      <div id="chat-foot">
        <textarea id="chat-inp" rows="1" placeholder="说点什么…"></textarea>
        <button id="chat-send">➤</button>
      </div>
    </div>

    <!-- 专注页 -->
    <div class="page" id="page-focus">

      <!-- 番茄钟 -->
      <div class="focus-timer-wrap">
        <div class="focus-ring-container">
          <svg class="focus-ring-svg" viewBox="0 0 100 100">
            <circle class="focus-ring-bg"       cx="50" cy="50" r="44"/>
            <circle class="focus-ring-progress" cx="50" cy="50" r="44"
                    id="focus-ring-progress"
                    style="stroke-dasharray:276.46; stroke-dashoffset:0;"/>
          </svg>
          <div class="focus-ring-inner">
            <div id="focus-time-display">25:00</div>
            <div id="focus-phase-label">准备好了吗</div>
          </div>
        </div>
        <button id="focus-start-btn" data-action="start">▶ 开始专注</button>
        <div id="focus-session-count">今日完成 0 个 🍅</div>
      </div>

      <!-- AI 感受 -->
      <div class="ai-comment-card">
        <div class="ai-comment-label">🐻 小熊说</div>
        <div id="ai-comment">选一个频道，我们一起开始。</div>
      </div>

      <!-- 频道选择 -->
      <div class="channel-section">
        <div class="channel-label">音乐频道</div>
        <div id="channel-row"></div>
      </div>

      <!-- 播放器 -->
      <div class="music-player-card">
        <div class="music-now-row">
          <div id="track-art">🎵</div>
          <div class="music-info">
            <div id="track-name">选择频道后开始播放</div>
            <div id="track-artist">Jamendo · 免费正版音乐</div>
          </div>
        </div>
        <div class="music-controls">
          <button id="music-prev-btn">⏮</button>
          <button id="music-play-btn">▶</button>
          <button id="music-next-btn">⏭</button>
        </div>
      </div>

      <div style="height:6px;flex-shrink:0;"></div>
    </div>

  </div><!-- /pages -->

  <!-- 底部 Dock（5个按钮）-->
  <div id="dock">
    <button class="dock-item active" data-page="home">
      <div class="di-icon-wrap">🏠</div>
      <span class="di-label">首页</span>
    </button>
    <button class="dock-item" data-page="notes">
      <div class="di-icon-wrap">📝</div>
      <span class="di-label">便签</span>
    </button>
    <button class="dock-item" data-page="chat">
      <div class="di-icon-wrap">💬</div>
      <span class="di-label">聊天</span>
    </button>
    <button class="dock-item" data-page="focus">
      <div class="di-icon-wrap">🍅</div>
      <span class="di-label">专注</span>
    </button>

  </div>

</div><!-- /app -->

<!-- 设置弹窗 -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>🌸 绒语 · 设置</h2>

    <div class="set-label">🐻 他的名字</div>
    <input class="set-inp" id="s-name" placeholder="陆沉">

    <div class="set-label">🐰 你的名字</div>
    <input class="set-inp" id="s-uname" placeholder="兔子小姐">

    <div class="set-label">📍 城市（天气）</div>
    <input class="set-inp" id="s-city" placeholder="上海">

    <div class="set-label">💌 心语库（一行一句，留空用内置）</div>
    <textarea class="set-txt" id="s-quotes" rows="4"
              placeholder="每行一条心语…"></textarea>

    <div class="set-label">📝 他的人设</div>
    <textarea class="set-txt" id="s-profile" rows="2"
              placeholder="温柔深情，只对你一人放下防备…"></textarea>

    <div class="set-label">🖼 桌面壁纸</div>
    <div class="wallpaper-row">
      <button class="wp-btn" id="wp-pick">📷 选择图片</button>
      <button class="wp-btn wp-clear" id="wp-clear">🌸 恢复默认</button>
    </div>
    <div class="wp-preview-wrap">
      <div id="wp-preview" class="wp-preview"></div>
      <span id="wp-hint" class="wp-hint">未设置壁纸</span>
    </div>

    <div class="set-row">
      <button id="set-save">💾 保存</button>
      <button id="set-close">取消</button>
    </div>
  </div>
</div>

<!-- 脚本 -->
<script src="js/utils.js"></script>
<script src="js/wallpaper.js"></script>
<script src="js/animation.js"></script>
<script src="js/weather.js"></script>
<script src="js/music.js"></script>
<script src="js/notes.js"></script>
<script src="js/chat.js"></script>
<script src="js/focus.js"></script>
<script src="js/main.js"></script>

<script>
  // 壁纸按钮
  document.getElementById('wp-pick').addEventListener('click', () => { tap(); pickWallpaper(); });
  document.getElementById('wp-clear').addEventListener('click', () => {
    tap(); clearWallpaper();
    document.getElementById('wp-preview').style.backgroundImage = '';
    document.getElementById('wp-hint').textContent = '未设置壁纸';
  });

  // 设置弹窗打开时同步壁纸预览
  document.getElementById('menu-btn').addEventListener('click', () => {
    const saved = Store.get('wallpaper');
    const prev  = document.getElementById('wp-preview');
    const hint  = document.getElementById('wp-hint');
    if (saved) { prev.style.backgroundImage = `url(${saved})`; hint.textContent = '已设置壁纸'; }
    else       { prev.style.backgroundImage = '';              hint.textContent = '未设置壁纸'; }
  }, { capture: false });

  // 专注页初始化（切换到该页时触发）
  // main.js 的 switchPage 会在切换到 focus 时调用
  initApp();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>

</body>
</html>
<
