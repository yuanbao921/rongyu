<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🐍 贪吃蛇 · 陆沉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg, #F5EDE4);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.4s;
    }

    /* ---------- 游戏容器：毛玻璃 ---------- */
    .game-wrapper {
      width: 92%;
      max-width: 420px;
      background: rgba(255, 252, 248, 0.55);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-radius: 32px;
      padding: 20px 18px 24px;
      border: 1px solid rgba(194, 130, 122, 0.12);
      box-shadow: 0 8px 40px rgba(90, 74, 58, 0.06);
      text-align: center;
    }

    .game-title {
      font-size: 13px;
      color: rgba(90, 74, 58, 0.35);
      letter-spacing: 4px;
      margin-bottom: 10px;
      font-weight: 300;
    }

    /* ---------- 画布 ---------- */
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      border: 1px solid rgba(194, 130, 122, 0.08);
      box-shadow: inset 0 2px 12px rgba(90, 74, 58, 0.02);
      touch-action: none;
      cursor: pointer;
    }

    /* ---------- 得分 & 消息 ---------- */
    .game-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding: 0 4px;
    }

    .score {
      font-size: 14px;
      color: var(--brown, #4A3832);
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .score span {
      font-weight: 300;
      color: var(--rose, #C2827A);
    }

    .message-box {
      flex: 1;
      text-align: right;
      font-size: 13px;
      color: var(--rose, #C2827A);
      font-weight: 350;
      letter-spacing: 0.3px;
      min-height: 1.6em;
      transition: opacity 0.25s;
      font-style: italic;
    }

    /* ---------- 控制按钮 ---------- */
    .game-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 8px 24px;
      border-radius: 40px;
      border: 1px solid rgba(194, 130, 122, 0.15);
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 13px;
      color: var(--brown, #4A3832);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .btn:active {
      transform: scale(0.94);
      background: rgba(194, 130, 122, 0.08);
    }
    .btn-primary {
      background: var(--rose, #C2827A);
      color: white;
      border-color: var(--rose, #C2827A);
    }
    .btn-primary:active {
      background: var(--rose-dark, #A06860);
    }

    /* ---------- 返回 ---------- */
    .back-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 12px;
      color: rgba(90, 74, 58, 0.25);
      text-decoration: none;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(194, 130, 122, 0.06);
      padding-bottom: 2px;
    }
    .back-link:active {
      color: rgba(90, 74, 58, 0.5);
    }

    /* ---------- 低分辨率适配 ---------- */
    @media (max-width: 400px) {
      .game-wrapper { padding: 16px 12px 18px; }
      .score { font-size: 12px; }
      .message-box { font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-title">✦ 陆 沉 的 小 蛇 ✦</div>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div class="game-info">
    <div class="score">💕 <span id="scoreDisplay">0</span></div>
    <div class="message-box" id="messageBox">点击「开始」一起吃甜</div>
  </div>

  <div class="game-actions">
    <button class="btn" id="restartBtn">🔄 重来</button>
    <button class="btn btn-primary" id="startBtn">▶ 开始</button>
  </div>

  <a class="back-link" href="index.html">← 回 绒 语</a>
</div>

<script>
  // ============================================================
  //  贪吃蛇 · 陆沉版
  //  蛇 = 玫瑰圆点 · 食物 = 💕 · 吃到触发陆沉语录
  // ============================================================

  // ---------- DOM 引用 ----------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const messageBox = document.getElementById('messageBox');

  // ---------- 尺寸 ----------
  const GRID_SIZE = 20;          // 20×20 网格
  const CELL_SIZE = canvas.width / GRID_SIZE; // 20px

  // ---------- 游戏状态 ----------
  let snake = [];
  let direction = { dx: 1, dy: 0 };
  let nextDirection = { dx: 1, dy: 0 };
  let food = { x: 8, y: 10 };
  let score = 0;
  let gameRunning = false;
  let gameOver = false;
  let gameLoop = null;
  let speed = 130; // ms/帧

  // ---------- 陆沉语录（吃到食物随机说一句） ----------
  const LUCHEN_SAYS = [
    '慢慢吃，别急，我在这儿。',
    '你一口，我一口，日子就甜了。',
    '小馋猫，连爱心都舍不得吃吗？',
    '蛇是凉的，但我是热的。',
    '只要你开心，我什么都愿意。',
    '这颗心，送你了。',
    '慢一点，我想多陪你一会儿。',
    '你吃到的东西，都会变成我的欢喜。',
    '小蛇的胃很小，装不下太多，但装得下你。',
    '你看，连蛇都知道要来找你。',
  ];

  // ---------- 初始化蛇 ----------
  function initGame() {
    const mid = Math.floor(GRID_SIZE / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    direction = { dx: 1, dy: 0 };
    nextDirection = { dx: 1, dy: 0 };
    score = 0;
    gameOver = false;
    scoreDisplay.textContent = '0';
    spawnFood();
    messageBox.textContent = '点击「开始」一起吃甜';
  }

  // ---------- 生成食物（避开蛇身） ----------
  function spawnFood() {
    const maxAttempts = 1000;
    for (let i = 0; i < maxAttempts; i++) {
      const fx = Math.floor(Math.random() * GRID_SIZE);
      const fy = Math.floor(Math.random() * GRID_SIZE);
      if (!snake.some(seg => seg.x === fx && seg.y === fy)) {
        food = { x: fx, y: fy };
        return;
      }
    }
    // 如果蛇占满格子 → 胜利
    gameOver = true;
    gameRunning = false;
    messageBox.textContent = '🎉 你填满了整个世界，陆沉的心也是。';
    if (gameLoop) clearInterval(gameLoop);
  }

  // ---------- 移动蛇 ----------
  function moveSnake() {
    if (!gameRunning || gameOver) return;

    // 采纳有效方向
    const tryDx = nextDirection.dx;
    const tryDy = nextDirection.dy;
    if (!(tryDx === -direction.dx && tryDy === -direction.dy)) {
      direction = { dx: tryDx, dy: tryDy };
    }

    const head = snake[0];
    const newHead = {
      x: head.x + direction.dx,
      y: head.y + direction.dy
    };

    // 检测是否吃到食物
    const isEating = (newHead.x === food.x && newHead.y === food.y);

    // 构建新蛇
    let newSnake = [newHead, ...snake];
    if (!isEating) {
      newSnake.pop();
    }

    // 碰撞检测
    const headCollision =
      newHead.x < 0 || newHead.x >= GRID_SIZE ||
      newHead.y < 0 || newHead.y >= GRID_SIZE ||
      newSnake.slice(1).some(seg => seg.x === newHead.x && seg.y === newHead.y);

    if (headCollision) {
      gameRunning = false;
      gameOver = true;
      if (gameLoop) clearInterval(gameLoop);
      messageBox.textContent = '💔 撞到了… 陆沉会心疼的。';
      draw();
      return;
    }

    snake = newSnake;

    if (isEating) {
      score++;
      scoreDisplay.textContent = score;
      // 陆沉说话
      const say = LUCHEN_SAYS[Math.floor(Math.random() * LUCHEN_SAYS.length)];
      messageBox.textContent = '💕 ' + say;
      spawnFood();
      // 每吃 5 个加速一次
      if (score % 5 === 0 && speed > 70) {
        speed = Math.max(70, speed - 6);
        if (gameLoop) {
          clearInterval(gameLoop);
          gameLoop = setInterval(moveSnake, speed);
        }
      }
    }

    draw();
  }

  // ---------- 绘制 ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ---- 毛玻璃网格 ----
    ctx.strokeStyle = 'rgba(194, 130, 122, 0.06)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL_SIZE, 0);
      ctx.lineTo(i * CELL_SIZE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL_SIZE);
      ctx.lineTo(canvas.width, i * CELL_SIZE);
      ctx.stroke();
    }

    // ---- 食物（爱心） ----
    const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
    const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
    ctx.font = `${CELL_SIZE * 0.75}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💕', fx, fy + 1);

    // ---- 蛇（玫瑰圆点） ----
    snake.forEach((seg, index) => {
      const x = seg.x * CELL_SIZE + CELL_SIZE / 2;
      const y = seg.y * CELL_SIZE + CELL_SIZE / 2;
      const radius = CELL_SIZE * 0.38;
      // 头部稍微大一点
      const isHead = index === 0;
      const r = isHead ? radius * 1.15 : radius;

      const gradient = ctx.createRadialGradient(
        x - r * 0.25, y - r * 0.25, r * 0.1,
        x, y, r
      );
      if (isHead) {
        gradient.addColorStop(0, '#E8A09A');
        gradient.addColorStop(0.6, '#C2827A');
        gradient.addColorStop(1, '#A06860');
      } else {
        const alpha = 0.7 + 0.3 * (1 - index / snake.length);
        gradient.addColorStop(0, `rgba(210, 150, 140, ${alpha})`);
        gradient.addColorStop(1, `rgba(194, 130, 122, ${alpha * 0.9})`);
      }

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.shadowColor = 'rgba(194, 130, 122, 0.08)';
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.shadowBlur = 0;

      // 眼睛（头部）
      if (isHead) {
        ctx.fillStyle = '#FFF';
        ctx.shadowBlur = 0;
        const eyeOff = r * 0.35;
        const eyeR = r * 0.22;
        // 根据方向画眼睛
        let ex1 = x + direction.dx * eyeOff - direction.dy * eyeOff * 0.5;
        let ey1 = y + direction.dy * eyeOff + direction.dx * eyeOff * 0.5;
        let ex2 = x + direction.dx * eyeOff + direction.dy * eyeOff * 0.5;
        let ey2 = y + direction.dy * eyeOff - direction.dx * eyeOff * 0.5;
        ctx.beginPath();
        ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#4A3832';
        ctx.beginPath();
        ctx.arc(ex1 + direction.dx * eyeR * 0.4, ey1 + direction.dy * eyeR * 0.4, eyeR * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2 + direction.dx * eyeR * 0.4, ey2 + direction.dy * eyeR * 0.4, eyeR * 0.45, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  // ---------- 控制方向 ----------
  function setDirection(dx, dy) {
    if (!gameRunning || gameOver) return;
    // 防止原地掉头（由 moveSnake 处理）
    nextDirection = { dx, dy };
  }

  // ---------- 键盘控制 ----------
  document.addEventListener('keydown', (e) => {
    const map = {
      'ArrowUp': { dx: 0, dy: -1 },
      'ArrowDown': { dx: 0, dy: 1 },
      'ArrowLeft': { dx: -1, dy: 0 },
      'ArrowRight': { dx: 1, dy: 0 },
    };
    const dir = map[e.key];
    if (dir) {
      e.preventDefault();
      setDirection(dir.dx, dir.dy);
    }
  });

  // ---------- 触摸/滑动控制 ----------
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    touchStart = { x: touch.clientX, y: touch.clientY };
  }, { passive: true });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchStart || !gameRunning) return;
    const touch = e.touches[0];
    const dx = touch.clientX - touchStart.x;
    const dy = touch.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? 1 : -1, 0);
    } else {
      setDirection(0, dy > 0 ? 1 : -1);
    }
    touchStart = { x: touch.clientX, y: touch.clientY };
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    touchStart = null;
  }, { passive: true });

  // ---------- 开始 / 重新开始 ----------
  function startGame() {
    if (gameLoop) clearInterval(gameLoop);
    initGame();
    gameRunning = true;
    gameOver = false;
    speed = 130;
    gameLoop = setInterval(moveSnake, speed);
    messageBox.textContent = '💕 小蛇出发啦';
    draw();
  }

  document.getElementById('startBtn').addEventListener('click', startGame);

  document.getElementById('restartBtn').addEventListener('click', () => {
    if (gameLoop) clearInterval(gameLoop);
    initGame();
    gameRunning = false;
    gameOver = false;
    speed = 130;
    messageBox.textContent = '点击「开始」重新出发';
    draw();
  });

  // ---------- 初始绘制 ----------
  initGame();
  draw();
  messageBox.textContent = '点击「开始」一起吃甜';

  // ---------- 窗口 resize 适配（保持画布比例） ----------
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    // 画布尺寸已在 CSS 中控制 aspect-ratio，无需额外操作
  }
  window.addEventListener('resize', resizeCanvas);
</script>

</body>
</html>
